name: Update schedule data & deploy

on:
  schedule:
    # Every 3 hours. Sections for terms under active registration (like
    # an upcoming Fall term over the summer) change throughout the day;
    # closed/past terms are skipped for the live-seat refresh entirely
    # (see is_term_finished in term_utils.py) so this stays cheap. Go
    # tighter (e.g. hourly, "0 * * * *") during peak registration weeks
    # if you want fresher numbers.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: read

jobs:
  build-and-deploy:
    # Scrapes fresh data and deploys it in the same job, without ever
    # committing back to the repo. This means the workflow only needs
    # read access to the repo plus pages/id-token write -- it works even
    # when "Read and write permissions" for the default GITHUB_TOKEN is
    # locked out (common on org-owned repos, where only an org owner can
    # change that setting). Each run fully regenerates web/data from
    # Macalester's live site, so there's no state that needs to persist
    # in git between runs.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape current data
        run: |
          # Refreshes the current/upcoming term plus the last several terms,
          # so "search all semesters" stays populated without re-scraping
          # the school's entire multi-decade term history every run.
          python scraper.py --all --max-terms 16

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
