name: Update schedule data & deploy

on:
  schedule:
    # Runs once a day at 13:00 UTC (~8am US Central during summer/fall,
    # 7am during winter/spring). Edit to taste -- during registration weeks
    # you may want this hourly.
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape current data
        run: |
          # Refreshes the current/upcoming term plus the last several terms,
          # so "search all semesters" stays populated without re-scraping
          # the school's entire multi-decade term history every run.
          python scraper.py --all --max-terms 16

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update schedule data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repo (post-scrape)
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
