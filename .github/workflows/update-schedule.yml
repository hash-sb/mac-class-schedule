name: Update schedule data & deploy

on:
  schedule:
    # Fires every hour, but most hours end up being a fast no-op: the
    # first step reads Macalester's live Academic Calendar and only lets
    # the rest of the job run if today falls inside a registration or
    # add/drop window, or it's the once-daily baseline hour. See
    # registration_calendar.py for the full logic.
    - cron: "0 * * * *"
  workflow_dispatch:      # lets you trigger a run manually from the Actions tab
    inputs:
      force:
        description: "Force a full scrape + deploy, ignoring the registration window check (useful while testing)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    # Scrapes fresh data and deploys it in the same job, without ever
    # committing back to the repo. This means the workflow only needs
    # read access to the repo plus pages/id-token write -- it works even
    # when "Read and write permissions" for the default GITHUB_TOKEN is
    # locked out (common on org-owned repos, where only an org owner can
    # change that setting). Each run fully regenerates web/data from
    # Macalester's live site, so there's no state that needs to persist
    # in git between runs.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check registration window
        id: window
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python registration_calendar.py --force
          else
            python registration_calendar.py
          fi

      - name: Install Playwright's Chromium
        if: steps.window.outputs.run_full == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Scrape current data
        if: steps.window.outputs.run_full == 'true'
        run: |
          # Refreshes the current/upcoming term plus the last several terms,
          # so "search all semesters" stays populated without re-scraping
          # the school's entire multi-decade term history every run.
          # --no-live-seats: the per-CRN Banner API refresh this used to do
          # is unverified (see scraper.py) and has been superseded by the
          # browser-rendered pass below, which reads the same Class
          # Schedule page a human would compare against.
          python scraper.py --all --max-terms 16 --no-live-seats

      - name: Refresh live seat counts from the Class Schedule page
        if: steps.window.outputs.run_full == 'true'
        run: |
          # Renders macadmsys.macalester.edu's Class Schedule page (a
          # different Banner host/environment than the search API above)
          # with a real headless browser and patches seats_available/
          # max_enrollment onto whatever scraper.py already collected.
          # Forced runs refresh every scraped term (useful for testing);
          # normal runs only touch terms that can still change.
          if [ "${{ inputs.force }}" = "true" ]; then
            python scrape_classschedule.py --all
          else
            python scrape_classschedule.py --all-nonfinished
          fi

      - name: Configure Pages
        if: steps.window.outputs.run_full == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site
        if: steps.window.outputs.run_full == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        if: steps.window.outputs.run_full == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skipped this hour
        if: steps.window.outputs.run_full != 'true'
        run: echo "Not in a registration/add-drop window and not the daily baseline hour -- skipping scrape and deploy this run."
